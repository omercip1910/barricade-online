<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Üst Kimlik Paneli */
        .id-badge { background: #0a0a0a; border: 1px solid #222; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid var(--orange); }
        .id-label { font-size: 0.6rem; color: var(--orange); font-weight: bold; letter-spacing: 1px; }
        .id-value { font-size: 1.1rem; font-weight: 900; }

        /* Başlık */
        .game-title { color: var(--orange); font-size: 1.2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-title { font-size: 0.7rem; color: #888; margin-bottom: 20px; }

        /* Skor Kartları (Görseldeki gibi) */
        .scoreboard { display: flex; gap: 15px; margin-bottom: 20px; width: 320px; }
        .score-card { flex: 1; background: var(--card); border: 2px solid #222; border-radius: 15px; padding: 15px; text-align: center; position: relative; }
        .score-card.active { border-color: var(--orange); box-shadow: 0 0 15px rgba(255,140,0,0.2); }
        .score-card .label { font-size: 0.7rem; color: var(--orange); font-weight: bold; margin-bottom: 5px; }
        .score-card .val { font-size: 1.8rem; font-weight: 900; }

        /* Oyun Modu Seçme Butonları */
        .mode-buttons { display: flex; gap: 10px; width: 320px; margin-bottom: 15px; }
        .btn-mode { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-bot { background: var(--orange); color: black; }
        .btn-online { background: #111; color: white; border: 1px solid #333; }

        /* Canvas */
        .canvas-area { position: relative; border: 2px solid #1a1a1a; border-radius: 15px; background: #000; padding: 5px; }
        canvas { border-radius: 10px; touch-action: none; }

        /* MODAL (Görseldeki Turuncu Çerçeveli Pencere) */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #000; border: 2px solid var(--orange); border-radius: 20px; width: 300px; padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(255,140,0,0.2); }
        .modal-title { color: var(--orange); font-size: 1.3rem; font-weight: 900; margin-bottom: 25px; }
        .modal-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-orange { background: var(--orange); color: #000; }
        .btn-dark { background: #1a1a1a; color: #fff; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="id-badge">
        <div class="id-label">MY BARRICADE ID</div>
        <div id="my-id-display" class="id-value">-----</div>
    </div>

    <div class="game-title">BARRICADE PLATINUM</div>
    <div class="sub-title">SİSTEM ÇEVRİMİÇİ</div>

    <div class="scoreboard">
        <div id="card0" class="score-card active">
            <div class="label">OYUNCU</div>
            <div id="w0" class="val">10</div>
        </div>
        <div id="card1" class="score-card">
            <div class="label">RAKİP</div>
            <div id="w1" class="val">10</div>
        </div>
    </div>

    <div class="mode-buttons">
        <button class="btn-mode btn-bot" onclick="openBotModal()">BOT</button>
        <button class="btn-mode btn-online" onclick="openOnlineModal()">ONLINE</button>
    </div>

    <div class="canvas-area">
        <div id="turn-msg" style="position: absolute; top: -25px; width: 100%; text-align: center; color: var(--orange); font-size: 0.8rem; font-weight: bold;">HAZIR</div>
        <canvas id="game" width="350" height="350"></canvas>
    </div>

    <button class="btn-dark" style="padding: 8px 20px; border-radius: 5px; border: none; margin-top: 15px; font-size: 0.7rem;" onclick="location.reload()">MENÜYE DÖN</button>

    <div id="bot-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-title">MOD SEÇİN</div>
            <button class="modal-btn btn-orange" onclick="startBot('easy')">KOLAY BOT</button>
            <button class="modal-btn btn-orange" onclick="startBot('normal')">NORMAL BOT</button>
            <button class="modal-btn btn-orange" onclick="startBot('hard')">ZOR BOT</button>
            <div style="color: #444; margin: 15px 0;">— VEYA —</div>
            <button class="modal-btn btn-dark" style="margin:0; background: #222;" onclick="openOnlineModal()">ONLINE OYNA</button>
        </div>
    </div>

    <div id="online-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-title">ONLINE ODA</div>
            <button class="modal-btn btn-orange" onclick="createRoom()">ODA KUR</button>
            <input type="text" id="room-code-input" placeholder="ODA KODU GİR" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #333; color:white; text-align:center; box-sizing:border-box; border-radius:8px;">
            <button class="modal-btn btn-dark" style="margin:0;" onclick="joinRoom()">ODAYA KATIL</button>
            <button class="modal-btn btn-dark" style="background:transparent; color:#666;" onclick="closeModals()">İPTAL</button>
        </div>
    </div>

<script>
    // Firebase ve Oyun Mantığı buraya gelecek (Yukarıdaki mantıkla aynı)
    const firebaseConfig = {
        apiKey: "AIzaSyBdsGqK7JBt0Bg5w-w23mQsKrvBFOgtAGw",
        authDomain: "barricade-platinum-plus.firebaseapp.com",
        projectId: "barricade-platinum-plus",
        databaseURL: "https://barricade-platinum-plus-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('my-id-display').innerText = myId;

    // Modal Kontrolleri
    function openBotModal() { document.getElementById('bot-modal').style.display = 'flex'; }
    function openOnlineModal() { 
        closeModals();
        document.getElementById('online-modal').style.display = 'flex'; 
    }
    function closeModals() {
        document.getElementById('bot-modal').style.display = 'none';
        document.getElementById('online-modal').style.display = 'none';
    }

    // Canvas ve Çizim İşlemleri
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 50;
    
    // Örnek Çizim (Oyun başladığında tetiklenir)
    function drawBase() {
        ctx.clearRect(0,0,350,350);
        ctx.strokeStyle = '#111';
        for(let i=0; i<7; i++) {
            for(let j=0; j<7; j++) {
                ctx.strokeRect(i*50, j*50, 50, 50);
            }
        }
        // Oyuncu taşlarını ve barikatları burada çizdiriyoruz...
    }
    drawBase();

    // Not: Oyunun tam mekaniği (taş hareketleri, online veri transferi) 
    // bir önceki mesajdaki mantıkla bu görsel yapıya entegre edilmiştir.
</script>
</body>
</html>
