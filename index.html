<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden; }
        
        /* Klasik Menü Tasarımı */
        .profile-bar { width: 100%; max-width: 350px; background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid #222; margin-bottom: 10px; text-align: center; }
        .id-label { font-size: 0.6rem; color: var(--orange); letter-spacing: 2px; font-weight: bold; }
        .id-value { font-size: 1.1rem; color: #fff; font-weight: 900; margin: 5px 0; }

        .btn-main { width: 100%; padding: 12px; margin: 5px 0; border: 2px solid #333; border-radius: 8px; font-weight: 900; cursor: pointer; background: #000; color: #fff; }
        .btn-main.active { border-color: var(--orange); background: var(--orange); color: #000; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: #000; border: 2px solid var(--orange); border-radius: 20px; padding: 25px; width: 280px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--orange); background: #111; color: white; text-align: center; box-sizing: border-box; }
        
        canvas { border: 3px solid #1a1a1a; border-radius: 15px; background: #000; display: block; max-width: 100%; height: auto; }
        #status-msg { color: var(--orange); font-weight: bold; margin: 10px 0; height: 20px; }
        
        #game-area { display: none; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="profile-bar">
            <div class="id-label">BARRICADE PLATINUM</div>
            <div class="id-value">ANA MENÜ</div>
        </div>
        <button class="btn-main active" onclick="startBotMode()">BOT İLE OYNA</button>
        <button class="btn-main" onclick="showOnlineMenu()">ONLINE MOD</button>
    </div>

    <div id="online-modal" class="modal-overlay">
        <div class="modal-box">
            <h1 style="color:var(--orange); font-size:1.2rem;">ONLINE ODA</h1>
            <button class="btn-main" style="background:var(--orange); color:black;" onclick="createRoom()">ODA KUR</button>
            <div style="margin:10px 0;">veya</div>
            <input type="text" id="join-code-input" placeholder="4 HANELİ KOD" maxlength="4">
            <button class="btn-main" onclick="joinRoom()">ODAYA KATIL</button>
            <button class="btn-main" style="border:none; color:#888;" onclick="closeModals()">İPTAL</button>
        </div>
    </div>

    <div id="game-area">
        <div id="status-msg">HAZIR</div>
        <div id="room-info" style="display:none; background:#111; padding:5px 15px; border-radius:20px; margin-bottom:10px; font-size:0.8rem;">
            ODA KODU: <span id="display-room-code" style="font-weight:bold; color:var(--orange);">----</span>
        </div>
        <canvas id="game" width="350" height="350"></canvas>
        <button class="btn-main" style="margin-top:20px; width:150px;" onclick="location.reload()">MENÜYE DÖN</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBdsGqK7JBt0Bg5w-w23mQsKrvBFOgtAGw",
        authDomain: "barricade-platinum-plus.firebaseapp.com",
        projectId: "barricade-platinum-plus",
        databaseURL: "https://barricade-platinum-plus-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomRef = null;
    let myRole = 0; // 0: Player 1 (Bot or Host), 1: Player 2 (Joiner)
    let isOnline = false;
    let state = { turn: 0, walls: [], players: [{x:3, y:6, w:10, c:'#ff4757', ty:0}, {x:3, y:0, w:10, c:'#2e86de', ty:6}], over: false };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 50;

    function showOnlineMenu() { document.getElementById('online-modal').style.display = 'flex'; }
    function closeModals() { document.getElementById('online-modal').style.display = 'none'; }

    function startBotMode() {
        isOnline = false;
        myRole = 0;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        draw();
    }

    function createRoom() {
        isOnline = true;
        myRole = 0;
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        roomRef = db.ref('rooms/' + code);
        roomRef.set({ state: state, status: "waiting" });
        setupGameUI(code);
    }

    function joinRoom() {
        const code = document.getElementById('join-code-input').value.trim();
        if(code.length !== 4) return alert("4 haneli kod gir!");
        isOnline = true;
        myRole = 1;
        roomRef = db.ref('rooms/' + code);
        roomRef.once('value', s => {
            if(!s.exists()) return alert("Oda bulunamadı!");
            roomRef.update({ status: "playing" });
            setupGameUI(code);
        });
    }

    function setupGameUI(code) {
        closeModals();
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        document.getElementById('room-info').style.display = 'block';
        document.getElementById('display-room-code').innerText = code;
        
        roomRef.on('value', s => {
            const data = s.val();
            if(!data) return;
            state = data.state;
            document.getElementById('status-msg').innerText = data.status === "waiting" ? "RAKİP BEKLENİYOR..." : (state.turn === myRole ? "SIRA SENDE!" : "RAKİPTE...");
            draw();
        });
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
        ctx.strokeStyle = '#222';
        for(let i=0; i<7; i++) for(let j=0; j<7; j++) ctx.strokeRect(i*CELL, j*CELL, CELL, CELL);
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+25, p.y*CELL+25, 18, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });
    }

    canvas.onclick = (e) => {
        if(state.turn !== myRole || state.over) return;
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (350/r.width), y = (e.clientY - r.top) * (350/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
        
        let p = state.players[myRole];
        if(Math.abs(cx - p.x) + Math.abs(cy - p.y) === 1) {
            p.x = cx; p.y = cy;
            state.turn = 1 - state.turn;
            if(isOnline) roomRef.update({ state: state });
            else { draw(); if(state.turn === 1) setTimeout(botMove, 500); }
        }
    };

    function botMove() {
        let b = state.players[1];
        if(b.y < 6) b.y++; 
        state.turn = 0;
        draw();
    }
</script>
</body>
</html>
