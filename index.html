<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tichk Platinum Plus - Modern Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* --- MODERN TASARIM DEĞİŞİKLİKLERİ --- */
        :root { 
            --orange: #ff8c00; 
            --orange-glow: rgba(255, 140, 0, 0.4);
            --bg: #0a0a0b; 
            --card-bg: rgba(25, 25, 28, 0.8);
            --border-color: #2a2a2e;
            --text-main: #e1e1e6;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top, #1a1a1f 0%, #0a0a0b 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        .main-wrapper { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profile-bar { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .id-label { font-size: 0.7rem; color: var(--orange); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .id-value { font-size: 1.1rem; font-family: 'Courier New', monospace; margin: 5px 0 10px 0; color: #fff; text-shadow: 0 0 5px var(--orange-glow); }

        .header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-weight: 900;
        }

        #msg { 
            font-size: 0.85rem; 
            height: 20px; 
            color: #aaa; 
            margin-top: 5px; 
            font-weight: 500; 
            text-align: center; 
            transition: all 0.3s;
        }

        .scoreboard { display: flex; gap: 10px; width: 100%; }
        .card { 
            flex: 1; 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            padding: 12px; 
            border-radius: 14px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .card.active { 
            border-color: var(--orange); 
            box-shadow: 0 0 20px var(--orange-glow);
            transform: scale(1.03);
            background: rgba(255, 140, 0, 0.05);
        }

        .num { font-size: 1.5rem; color: var(--orange); font-weight: 800; margin-top: 4px; }
        
        .mode-selection { display: flex; gap: 8px; width: 100%; }
        .btn-main { 
            flex: 1; 
            padding: 12px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            background: #151518; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            color: #888; 
            cursor: pointer; 
            transition: 0.3s;
            text-transform: uppercase;
        }
        
        .btn-main.active { 
            background: var(--orange); 
            color: #000; 
            border-color: var(--orange);
            box-shadow: 0 4px 12px var(--orange-glow);
        }

        .canvas-container { 
            width: 100%; 
            aspect-ratio: 1/1;
            border: 4px solid #1a1a1f; 
            border-radius: 20px; 
            background: #000; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        canvas { width: 100%; height: 100%; display: block; }

        /* Modern Input & Button */
        .input-group { display: flex; gap: 8px; margin-top: 5px; }
        input[type="text"] { 
            flex: 1; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 0.8rem; 
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--orange); }

        .btn-set { 
            background: var(--orange); 
            border: none; 
            border-radius: 8px; 
            font-size: 0.75rem; 
            padding: 0 15px; 
            font-weight: bold;
            cursor: pointer; 
        }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { 
            background: #151518; 
            border: 1px solid var(--orange); 
            border-radius: 24px; 
            padding: 25px; 
            width: 85%; 
            max-width: 320px; 
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        
        .btn-action { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            border-radius: 12px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .btn-action:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="profile-bar">
        <div class="id-label">Oyuncu Kimliği</div>
        <div class="id-value" id="display-my-id">---</div>
        <div class="input-group">
            <input type="text" id="user-name-input" placeholder="İsminizi yazın..." maxlength="12">
            <button class="btn-set" onclick="updateName()">KAYDET</button>
        </div>
    </div>

    <div class="header">
        <h1>TICHK PLATINUM</h1>
        <div id="msg">SİSTEM HAZIR</div>
    </div>

    <div class="scoreboard">
        <div id="c0" class="card active">
            <small id="name-p1" style="color:#aaa; font-weight:bold;">HOST</small>
            <div class="num" id="w0">10</div>
        </div>
        <div id="c1" class="card">
            <small id="p2-label" style="color:#aaa; font-weight:bold;">GUEST</small>
            <div class="num" id="w1">10</div>
        </div>
    </div>

    <div class="mode-selection">
        <button id="m_bot" class="btn-main active" onclick="setMode('bot')">Yapay Zeka</button>
        <button id="m_online" class="btn-main" onclick="toggleRoomModal(true)">Online Arena</button>
    </div>

    <div class="canvas-container">
        <canvas id="game" width="350" height="350"></canvas>
    </div>
</div>

<!-- Modal ve Script kısımları aynı mantıkla devam ediyor, görsel sınıflar güncellendi -->
<div id="room-screen" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <h2 style="color:var(--orange); font-size:1.2rem; margin:0 0 20px 0; letter-spacing:1px;">ONLINE ARENA</h2>
        <button class="btn-action" style="background:var(--orange); color:#000;" onclick="hostGame()">YENİ ODA OLUŞTUR</button>
        <div style="margin: 20px 0; display:flex; align-items:center; color:#444;">
            <div style="flex:1; height:1px; background:#333;"></div>
            <span style="padding:0 10px; font-size:0.7rem;">VEYA</span>
            <div style="flex:1; height:1px; background:#333;"></div>
        </div>
        <input type="text" id="target-room-id" style="width:100%; padding:14px; background:#000; color:#fff; border:1px solid #444; border-radius:12px; text-align:center; margin-bottom:10px; font-family:monospace; font-size:1.1rem;" placeholder="RAKİP ID">
        <button class="btn-action" style="background:#2e86de; color:#fff;" onclick="joinGame()">ODAYA KATIL</button>
        <button class="btn-action" style="background:transparent; color:#666; margin-top:15px;" onclick="toggleRoomModal(false)">GERİ DÖN</button>
    </div>
</div>

<script>
    // --- Önceki mantık kodları (Firebase, Bot, Oyun Mekaniği) burada aynen korunmuştur ---
    // (Kodun kısalması için mantık kısmını tekrar yazmıyorum, yukarıdaki V8 mantığı ile birebir uyumludur)
    // Sadece draw() fonksiyonunda görsel dokunuşlar yapıldı.

    // ... (Firebase Config ve State tanımları buraya gelecek) ...

    function draw() {
        // Arka Plan
        ctx.fillStyle = '#0a0a0b'; 
        ctx.fillRect(0,0,350,350);
        
        // Izgara Çizimi (Daha soft)
        ctx.strokeStyle = '#1a1a1f'; 
        ctx.lineWidth = 1;
        for(let i=0; i<=GRID; i++) { 
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,350); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(350,i*CELL); ctx.stroke(); 
        }

        // Duvarlar (Neon Turuncu Efekti)
        if(!state.walls) state.walls = [];
        state.walls.forEach(w => { 
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 140, 0, 0.5)';
            ctx.fillStyle = '#ff8c00'; 
            if(w.t==='v') {
                ctx.fillRect((w.x+1)*CELL-5, w.y*CELL+6, 10, CELL-12); 
            } else {
                ctx.fillRect(w.x*CELL+6, (w.y+1)*CELL-5, CELL-12, 10); 
            }
            ctx.shadowBlur = 0;
        });

        // Oyuncular (Gradiyent ve Parlama)
        state.players.forEach((p, i) => { 
            ctx.save();
            ctx.beginPath(); 
            ctx.arc(p.x*CELL+CELL/2, p.y*CELL+CELL/2, CELL*0.35, 0, Math.PI*2); 
            
            let grad = ctx.createRadialGradient(p.x*CELL+CELL/2, p.y*CELL/2, 0, p.x*CELL+CELL/2, p.y*CELL/2, CELL*0.4);
            grad.addColorStop(0, p.c);
            grad.addColorStop(1, '#000');
            
            ctx.fillStyle = grad;
            ctx.shadowBlur = state.turn === i ? 15 : 5;
            ctx.shadowColor = p.c;
            ctx.fill(); 
            
            if(state.turn===i){ 
                ctx.strokeStyle='#fff'; 
                ctx.lineWidth=2; 
                ctx.stroke(); 
            } 
            ctx.restore();
        });

        // Skor ve aktiflik güncellemeleri
        document.getElementById('w0').innerText = state.players[0].w; 
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = state.turn===0?'card active':'card'; 
        document.getElementById('c1').className = state.turn===1?'card active':'card';
    }

    // ... (Diğer tüm mekanik fonksiyonları V8 ile aynı şekilde ekleyebilirsin) ...
</script>
</body>
</html>
