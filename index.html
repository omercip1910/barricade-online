<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum - Pro Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; overflow: hidden; }
        
        /* Üst Panel & Skorlar */
        .header { width: 100%; max-width: 360px; margin-bottom: 15px; }
        .profile-card { background: var(--card); padding: 12px; border-radius: 15px; border: 2px solid #222; text-align: center; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .scoreboard { display: flex; gap: 10px; }
        .score-box { flex: 1; background: var(--card); border: 2px solid #222; padding: 10px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .score-box.active { border-color: var(--orange); background: rgba(255,140,0,0.05); }
        .score-box h2 { margin: 0; font-size: 1.5rem; color: var(--orange); }
        .score-box span { font-size: 0.7rem; color: #888; font-weight: bold; }

        /* Butonlar & Kontroller */
        .btn-group { display: flex; gap: 5px; width: 100%; max-width: 360px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-orange { background: var(--orange); color: black; }
        .btn-dark { background: #1a1a1a; color: white; border: 1px solid #333; }
        .btn-dark:active { background: #333; }

        /* Oyun Alanı */
        canvas { border: 3px solid #1a1a1a; border-radius: 15px; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); touch-action: none; }
        
        /* Modallar */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .menu-box { background: #000; border: 2px solid var(--orange); padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--orange); color: white; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-card">
            <div style="font-size: 0.6rem; color: var(--orange); font-weight: bold;">BARRICADE PLATINUM</div>
            <div id="status-text" style="font-size: 0.9rem; font-weight: 900; margin-top: 5px;">SİSTEM ÇEVRİMİÇİ</div>
        </div>
        <div class="scoreboard">
            <div id="p0-card" class="score-box active">
                <span id="p0-name">OYUNCU</span>
                <h2 id="p0-walls">10</h2>
            </div>
            <div id="p1-card" class="score-box">
                <span id="p1-name">BOT</span>
                <h2 id="p1-walls">10</h2>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="move-btn" class="btn btn-orange" onclick="setMode('move')">YÜRÜ</button>
        <button id="wall-btn" class="btn btn-dark" onclick="setMode('wall')">BARİKAT</button>
    </div>

    <canvas id="game" width="350" height="350"></canvas>

    <button class="btn btn-dark" style="margin-top: 15px; width: 120px;" onclick="showMainMenu()">MENÜ</button>

    <div id="main-menu" class="overlay" style="display: flex;">
        <div class="menu-box">
            <h2 style="color: var(--orange); margin-top: 0;">MOD SEÇİN</h2>
            <button class="btn btn-orange" style="width: 100%; margin: 5px 0;" onclick="startBot('easy')">KOLAY BOT</button>
            <button class="btn btn-orange" style="width: 100%; margin: 5px 0;" onclick="startBot('normal')">NORMAL BOT</button>
            <button class="btn btn-orange" style="width: 100%; margin: 5px 0;" onclick="startBot('hard')">ZOR BOT</button>
            <div style="margin: 15px 0; color: #444;">— VEYA —</div>
            <button class="btn btn-dark" style="width: 100%;" onclick="openOnline()">ONLINE OYNA</button>
        </div>
    </div>

    <div id="online-menu" class="overlay">
        <div class="menu-box">
            <h2 style="color: var(--orange); margin-top: 0;">ONLINE ODA</h2>
            <button class="btn btn-orange" style="width: 100%;" onclick="createRoom()">ODA KUR</button>
            <input type="text" id="room-code-input" placeholder="4 HANELİ KOD">
            <button class="btn btn-dark" style="width: 100%;" onclick="joinRoom()">KATIL</button>
            <button class="btn btn-dark" style="border: none; margin-top: 10px; color: #666;" onclick="showMainMenu()">GERİ</button>
        </div>
    </div>

<script>
    // Firebase Ayarları
    const firebaseConfig = {
        apiKey: "AIzaSyBdsGqK7JBt0Bg5w-w23mQsKrvBFOgtAGw",
        authDomain: "barricade-platinum-plus.firebaseapp.com",
        projectId: "barricade-platinum-plus",
        databaseURL: "https://barricade-platinum-plus-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 50;

    let gameMode = 'move'; // 'move' veya 'wall'
    let difficulty = 'normal';
    let isOnline = false;
    let myRole = 0;
    let roomRef = null;
    let state = {
        turn: 0,
        walls: [], // {x, y, t: 'v'/'h'}
        players: [
            {x: 3, y: 6, w: 10, c: '#ff4757', target: 0},
            {x: 3, y: 0, w: 10, c: '#2e86de', target: 6}
        ],
        over: false
    };

    function setMode(m) {
        if(state.turn !== myRole) return;
        gameMode = m;
        document.getElementById('move-btn').className = m === 'move' ? 'btn btn-orange' : 'btn btn-dark';
        document.getElementById('wall-btn').className = m === 'wall' ? 'btn btn-orange' : 'btn btn-dark';
    }

    function showMainMenu() {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        document.getElementById('main-menu').style.display = 'flex';
    }

    function openOnline() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('online-menu').style.display = 'flex';
    }

    function startBot(diff) {
        difficulty = diff;
        isOnline = false;
        myRole = 0;
        state.players[1].w = diff === 'easy' ? 5 : (diff === 'hard' ? 15 : 10);
        showMainMenu();
        document.getElementById('main-menu').style.display = 'none';
        updateUI();
        draw();
    }

    // --- ONLINE MANTIK ---
    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        isOnline = true; myRole = 0;
        roomRef = db.ref('rooms/' + code);
        roomRef.set({ state: state, status: 'waiting' });
        listenRoom(code);
    }

    function joinRoom() {
        const code = document.getElementById('room-code-input').value;
        if(code.length !== 4) return;
        isOnline = true; myRole = 1;
        roomRef = db.ref('rooms/' + code);
        roomRef.update({ status: 'playing' });
        listenRoom(code);
    }

    function listenRoom(code) {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        roomRef.on('value', s => {
            if(!s.exists()) return;
            state = s.val().state;
            document.getElementById('status-text').innerText = "ODA: " + code;
            updateUI();
            draw();
        });
    }

    // --- ÇİZİM VE OYUN ---
    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
        ctx.strokeStyle = '#222';
        for(let i=0; i<7; i++) for(let j=0; j<7; j++) ctx.strokeRect(i*CELL, j*CELL, CELL, CELL);

        // Duvarlar
        state.walls.forEach(w => {
            ctx.fillStyle = var(--orange);
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-4, w.y*CELL+5, 8, CELL-10);
            else ctx.fillRect(w.x*CELL+5, (w.y+1)*CELL-4, CELL-10, 8);
        });

        // Oyuncular
        state.players.forEach((p, i) => {
            ctx.shadowBlur = 15; ctx.shadowColor = p.c;
            ctx.beginPath(); ctx.arc(p.x*CELL+25, p.y*CELL+25, 18, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            ctx.shadowBlur = 0;
            if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });
    }

    canvas.onclick = (e) => {
        if(state.turn !== myRole || state.over) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (350/rect.width);
        const y = (e.clientY - rect.top) * (350/rect.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);

        if(gameMode === 'move') {
            let p = state.players[myRole];
            if(Math.abs(cx - p.x) + Math.abs(cy - p.y) === 1) {
                // Duvar kontrolü buraya eklenebilir
                p.x = cx; p.y = cy;
                if(p.y === p.target) state.over = true;
                endTurn();
            }
        } else {
            // Barikat Koyma (Basit dikey duvar)
            if(state.players[myRole].w > 0) {
                state.walls.push({x: cx, y: cy, t: 'v'});
                state.players[myRole].w--;
                endTurn();
            }
        }
    };

    function endTurn() {
        state.turn = 1 - state.turn;
        if(isOnline) roomRef.update({ state: state });
        else {
            updateUI(); draw();
            if(!state.over && state.turn === 1) setTimeout(botTurn, 600);
        }
    }

    function botTurn() {
        let b = state.players[1];
        // Zorluk seviyesine göre hareket
        if(difficulty === 'hard' && Math.random() > 0.5 && b.w > 0) {
            state.walls.push({x: state.players[0].x, y: state.players[0].y, t: 'h'});
            b.w--;
        } else {
            if(b.y < 6) b.y++;
        }
        if(b.y === b.target) state.over = true;
        state.turn = 0;
        updateUI(); draw();
    }

    function updateUI() {
        document.getElementById('p0-walls').innerText = state.players[0].w;
        document.getElementById('p1-walls').innerText = state.players[1].w;
        document.getElementById('p0-card').className = state.turn === 0 ? 'score-box active' : 'score-box';
        document.getElementById('p1-card').className = state.turn === 1 ? 'score-box active' : 'score-box';
    }
</script>
</body>
</html>
