
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum - Online Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; --blue: #00e5ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden; }
        
        /* Üst Bilgi Paneli */
        .header-panel { width: 100%; max-width: 350px; text-align: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 1.1rem; color: var(--orange); letter-spacing: 2px; }
        
        /* Skorboard */
        .scoreboard { display: flex; gap: 8px; width: 100%; max-width: 350px; margin: 10px 0; }
        .card { flex: 1; background: var(--card); border: 2px solid #222; padding: 10px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .card.active { border-color: var(--orange); box-shadow: 0 0 15px rgba(255,140,0,0.3); }
        .num { font-size: 1.6rem; color: var(--orange); font-weight: 900; }
        .name-label { font-size: 0.7rem; font-weight: bold; color: #888; text-transform: uppercase; }

        /* Oyun Kontrolleri */
        .controls { display: flex; gap: 6px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .btn-act { flex: 1; padding: 12px; border: 2px solid #333; border-radius: 8px; font-weight: bold; background: #000; color: #fff; cursor: pointer; font-size: 0.7rem; }
        .btn-act.active { border-color: var(--orange); background: var(--orange); color: #000; }

        /* Canvas ve Oyun Alanı */
        .game-wrap { position: relative; border: 3px solid #1a1a1a; border-radius: 15px; background: #000; line-height: 0; }
        canvas { touch-action: none; border-radius: 12px; }

        /* Menü ve Modallar */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .menu-box { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--orange); width: 280px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--orange); background: #000; color: white; text-align: center; outline: none; }
        .btn-main { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; background: var(--orange); color: black; }
        
        #status-msg { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #fff; }
    </style>
</head>
